<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configure Deployment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="back-link">&larr; Back to templates</a>
            <h1 id="template-title">Configure Deployment</h1>
            <p class="subtitle" id="template-desc"></p>
        </header>

        <form id="deploy-form" class="deploy-form">
            <div id="form-fields">
                <!-- Dynamically generated -->
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">&#9889; Deploy Now</button>
                <button type="button" class="btn btn-secondary" onclick="window.location='index.html'">Cancel</button>
            </div>
        </form>

        <div id="deploy-status" class="status-box" style="display:none;">
            <h3>Deployment Started</h3>
            <p>Deployment ID: <code id="deploy-id"></code></p>
            <p class="deploy-id-hint">&#128204; Save this ID! You can use it to track your resources on the <a href="resources.html">Resource Checker</a> page.</p>
            <a id="log-link" href="#" class="btn">View Logs &rarr;</a>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const templateId = params.get('template');
            if (templateId) {
                loadForm(templateId);
            } else {
                window.location = 'index.html';
            }
        });
    </script>
</body>
</html>
